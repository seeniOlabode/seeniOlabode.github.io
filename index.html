<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap" rel="stylesheet"> 
</head>
<body>
    <div class="calculator-container">
        <div class="screen">
            <span class="screen-buffer"></span></span>   
        </div>
        <div class="buttons">
            <div class="special-operator-buttons">
                <button class="special-operator calc-button span-2">AC</button>
                <button class="special-operator calc-button">←</button>
            </div>
            <div class="arithmetic-operator-buttons">
                <button class="arithmetic-operator calc-button">÷</button>
                <button class="arithmetic-operator calc-button">×</button>
                <button class="arithmetic-operator calc-button">-</button>
                <button class="arithmetic-operator calc-button">+</button>
                <button class="arithmetic-operator calc-button">=</button>
            </div>
            <div class="digit-buttons">
                <button class="digit calc-button">7</button>
                <button class="digit calc-button">8</button>
                <button class="digit calc-button">9</button>
                <button class="digit calc-button">4</button>
                <button class="digit calc-button">5</button>
                <button class="digit calc-button">6</button>
                <button class="digit calc-button">3</button>
                <button class="digit calc-button">2</button>
                <button class="digit calc-button">1</button>
                <button class="digit calc-button span-2">0</button>
                <button class="digit calc-button">.</button>
            </div>
        </div>
    </div>
    <script src="messages.js"></script>
    <script src="app.js"></script>
</body>
</html>
